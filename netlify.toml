[build]
  publish = "Portifolio"
  base = "public"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/visits/track"
  to = "/.netlify/functions/visits-track"
  status = 200
  force = true

[[redirects]]
  from = "/api/visits/stats"
  to = "/.netlify/functions/visits-stats"
  status = 200
  force = true